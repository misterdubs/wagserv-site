<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wagserv — Hello World</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      background: var(--panel);
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 540px;
    }
    h1 { color: var(--accent); margin-top: 0; }
    p  { line-height: 1.6; }
    code {
      background: rgba(255,255,255,0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, World</h1>
    <p>If you can read this, <code>wagserv.net</code> is live and serving content from nginx.</p>
    <p>This page is the starting point for a small demo site — forms, menus, and fields will be added next.</p>
    <footer>Deployed from GitHub &middot; v0.1</footer>
  </main>
</body>
</html>
